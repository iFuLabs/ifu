name: Deploy to Render via GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare Image Metadata
        id: meta
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "sha_short=${IMAGE_TAG:0:7}" >> $GITHUB_OUTPUT
          REPO_LOWER=$(echo "$REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ steps.meta.outputs.sha_short }}

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          REPO: ${{ steps.meta.outputs.repo }}
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
        run: |
          curl -X GET "${RENDER_DEPLOY_HOOK}&imgURL=ghcr.io/${REPO}:${SHA_SHORT}"