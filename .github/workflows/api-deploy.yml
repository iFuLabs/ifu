name: Deploy API

on:
  push:
    branches:
      - aws-deployment
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package*.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ifulabs-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Check App Runner Service Status
        id: check-service
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='ifulabs-api'].ServiceArn | [0]" \
            --output text)
          
          if [ "$SERVICE_ARN" = "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "service_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ App Runner service not found. Run Terraform to create it."
          else
            echo "service_exists=true" >> $GITHUB_OUTPUT
            echo "service_arn=$SERVICE_ARN" >> $GITHUB_OUTPUT
            
            STATUS=$(aws apprunner describe-service --service-arn $SERVICE_ARN \
              --query "Service.Status" --output text)
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "📊 Service status: $STATUS"
          fi

      - name: Deploy to App Runner
        if: steps.check-service.outputs.service_exists == 'true' && steps.check-service.outputs.status == 'RUNNING'
        run: |
          echo "🚀 Starting deployment..."
          aws apprunner start-deployment --service-arn ${{ steps.check-service.outputs.service_arn }}
          echo "✅ Deployment started successfully!"

      - name: Handle Failed Service
        if: steps.check-service.outputs.service_exists == 'true' && (steps.check-service.outputs.status == 'CREATE_FAILED' || steps.check-service.outputs.status == 'OPERATION_IN_PROGRESS')
        run: |
          echo "⚠️ App Runner service is in '${{ steps.check-service.outputs.status }}' state"
          echo "🗑️ Deleting failed service..."
          aws apprunner delete-service --service-arn ${{ steps.check-service.outputs.service_arn }}
          echo "✅ Failed service deleted. Run Terraform to recreate it."
          exit 0
      
      - name: Service Not Ready
        if: steps.check-service.outputs.service_exists == 'true' && steps.check-service.outputs.status != 'RUNNING' && steps.check-service.outputs.status != 'CREATE_FAILED' && steps.check-service.outputs.status != 'OPERATION_IN_PROGRESS'
        run: |
          echo "⚠️ App Runner service is in '${{ steps.check-service.outputs.status }}' state"
          echo "Waiting for service to be ready..."
          exit 1

      - name: Service Not Found
        if: steps.check-service.outputs.service_exists == 'false'
        run: |
          echo "✅ Docker image pushed successfully to ECR!"
          echo ""
          echo "Next step: Run Terraform apply to create the App Runner service"
          exit 0
