AWSTemplateFormatVersion: '2010-09-09'
Description: 'Ghara by iFU Labs — Read-only IAM role for compliance and cost scanning'

Parameters:
  ExternalId:
    Type: String
    Description: 'External ID provided by Ghara (prevents confused deputy attacks)'
  TrustedAccountId:
    Type: String
    Default: '385936845264'
    Description: 'iFU Labs AWS account ID that will assume this role'

Resources:
  GharaReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GharaReadOnlyRole
      Description: 'Read-only role for Ghara compliance and cost scanning'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedAccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess
      Policies:
        - PolicyName: GharaCostAndComplianceReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CostExplorer
                Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                  - ce:GetCostForecast
                  - ce:GetReservationCoverage
                  - ce:GetReservationUtilization
                  - ce:GetSavingsPlansCoverage
                  - ce:GetSavingsPlansUtilization
                  - ce:GetRightsizingRecommendation
                  - ce:GetSavingsPlansPurchaseRecommendation
                  - ce:GetReservationPurchaseRecommendation
                Resource: '*'
              - Sid: ComputeOptimizer
                Effect: Allow
                Action:
                  - compute-optimizer:GetEC2InstanceRecommendations
                  - compute-optimizer:GetAutoScalingGroupRecommendations
                Resource: '*'
              - Sid: EC2
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeVolumes
                  - ec2:DescribeAddresses
                  - ec2:DescribeNatGateways
                  - ec2:DescribeSnapshots
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeRegions
                Resource: '*'
              - Sid: ELB
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeInstanceHealth
                Resource: '*'
              - Sid: RDS
                Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                Resource: '*'
              - Sid: CloudWatch
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeMetricFilters
                Resource: '*'
              - Sid: IAM
                Effect: Allow
                Action:
                  - iam:GetAccountPasswordPolicy
                  - iam:ListUsers
                  - iam:ListMFADevices
                  - iam:ListAccessKeys
                  - iam:GetAccessKeyLastUsed
                  - iam:GetCredentialReport
                  - iam:GenerateCredentialReport
                  - iam:ListAccountAliases
                Resource: '*'
              - Sid: S3
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketEncryption
                  - s3:GetBucketVersioning
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicyStatus
                  - s3:GetBucketLogging
                Resource: '*'
              - Sid: CloudTrail
                Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                Resource: '*'
              - Sid: GuardDuty
                Effect: Allow
                Action:
                  - guardduty:ListDetectors
                  - guardduty:GetDetector
                Resource: '*'
              - Sid: Config
                Effect: Allow
                Action:
                  - config:DescribeConfigurationRecorders
                  - config:DescribeConfigurationRecorderStatus
                Resource: '*'
              - Sid: EKS
                Effect: Allow
                Action:
                  - eks:ListClusters
                  - eks:DescribeCluster
                  - eks:ListNodegroups
                Resource: '*'
              - Sid: KMS
                Effect: Allow
                Action:
                  - kms:ListKeys
                  - kms:DescribeKey
                  - kms:GetKeyRotationStatus
                  - kms:ListAliases
                Resource: '*'
              - Sid: VPCFlowLogs
                Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeFlowLogs
                Resource: '*'
              - Sid: IAMRolePolicies
                Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:GetRolePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                Resource: '*'
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: Ghara
        - Key: Purpose
          Value: ComplianceAndCostScanning

Outputs:
  RoleArn:
    Description: 'Copy this Role ARN and paste it into Ghara'
    Value: !GetAtt GharaReadOnlyRole.Arn
  ExternalId:
    Description: 'External ID used for this connection'
    Value: !Ref ExternalId
